<template>
    <h2 class="slds-text-heading_medium slds-m-bottom_medium section-title">Acciones Rápidas</h2>
    <div class="slds-grid slds-gutters slds-m-bottom_x-large slds-wrap">
        <template for:each={actions} for:item="action">
            <div key={action.id} class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-large-size_1-of-4 slds-m-bottom_medium">
                <button class="slds-box slds-theme_default slds-grid slds-grid_vertical-align-center slds-p-around_medium action-card" data-action-id={action.id} onclick={handleActionClick}>
                    <div class={action.iconContainerClass}>
                        <lightning-icon icon-name={action.icon} size="small"></lightning-icon>
                    </div>
                    <div class="slds-text-align_left">
                        <p class="slds-text-title_bold action-label">{action.label}</p>
                        <p class="slds-text-body_small slds-text-color_weak">{action.subtitle}</p>
                    </div>
                </button>
            </div>
        </template>
    </div>
</template>
