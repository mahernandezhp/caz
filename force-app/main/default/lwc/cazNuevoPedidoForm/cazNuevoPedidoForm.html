<template>
    <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="text"
                label="Cuenta"
                value={accountName}
                disabled>
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="text"
                label="Contacto"
                value={contactName}
                disabled>
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="text"
                label="Clave de cuenta"
                value={claveCuenta}
                disabled>
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="text"
                label="Planta"
                value={plantaDefault}
                disabled>
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="date"
                name="fechaSolicitud"
                label="Fecha de solicitud"
                value={fechaSolicitud}
                onchange={handleChange}
                required
                min={hoy}>
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
            <lightning-input
                type="number"
                name="cantidad"
                label="Cantidad"
                value={cantidad}
                onchange={handleChange}
                required
                min="1">
            </lightning-input>
        </div>

        <div class="slds-col slds-size_1-of-1">
            <lightning-combobox
                name="tipoCemento"
                label="Tipo de cemento"
                value={tipoCemento}
                onchange={handleChange}
                placeholder="Selecciona una opción"
                options={tipoCementoOptions}
                required>
            </lightning-combobox>
        </div>
    </div>

    <div class="slds-m-top_large slds-text-align_right">
        <lightning-button
            label="Cancelar"
            onclick={handleCancel}>
        </lightning-button>

        <lightning-button
            class="slds-m-left_small"
            variant="brand"
            label="Guardar"
            onclick={handleGuardar}
            disabled={guardando}>
        </lightning-button>
    </div>
</template>
