<template>
    <div class="caz-solicitud-container">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
        </template>

        <template if:false={isSubmitted}>
            <div class="slds-card slds-p-around_medium">
                <h2 class="slds-text-heading_medium slds-m-bottom_medium">{title}</h2>

                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_small" role="alert">
                        <span class="slds-assistive-text">Error</span>
                        <p>{errorMessage}</p>
                    </div>
                </template>

                <lightning-record-edit-form
                    object-api-name={objectApiName}
                    onsuccess={handleSuccess}
                    onerror={handleError}
                    onsubmit={handleSubmit}>

                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_ImporteDevolucion__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_MotivoDevolucion__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_NumeroCuentaBancaria__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_ComprobanteReferencia__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input-field field-name="CAZ_Description__c" required></lightning-input-field>
                        </div>
                    </div>

                    <div class="slds-m-top_medium">
                        <lightning-button
                            variant="brand"
                            type="submit"
                            label="Enviar Solicitud"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            variant="neutral"
                            label="Cancelar"
                            onclick={handleCancel}>
                        </lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </template>

        <template if:true={isSubmitted}>
            <div class="slds-card slds-p-around_large slds-align_absolute-center slds-grid slds-grid_vertical">
                <div class="slds-text-align_center slds-m-bottom_large">
                    <lightning-icon icon-name="action:approval" size="large" class="slds-m-bottom_medium"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-bottom_small">Solicitud Registrada Temporalmente</h2>
                    <p class="slds-text-body_regular">Tu solicitud de devolución <strong>{recordName}</strong> fue guardada exitosamente en estado <strong>Borrador</strong>.</p>
                    <p class="slds-text-body_regular slds-m-top_x-small">Para poder enviarla a revisión, por favor adjunta los documentos requeridos a continuación. Si requieres más tiempo, puedes continuar más tarde desde la sección de Mis Solicitudes.</p>
                </div>

                <div class="slds-size_1-of-1 slds-m-bottom_x-large" style="max-width: 600px;">
                    <c-caz-carga-documentos record-id={newRecordId}></c-caz-carga-documentos>
                </div>

                <div class="slds-text-align_center slds-p-top_large slds-border_top">
                    <lightning-button
                        variant="brand"
                        label="Finalizar y Ver Mis Solicitudes"
                        onclick={handleVerSolicitudes}>
                    </lightning-button>
                </div>
            </div>
        </template>
    </div>
</template>
