<template>
    <div class="caz-solicitud-container">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
        </template>


            <div class="slds-card slds-p-around_medium">

                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_small" role="alert">
                        <span class="slds-assistive-text">Error</span>
                        <p>{errorMessage}</p>
                    </div>
                </template>

                <lightning-record-edit-form
                    object-api-name={objectApiName}
                    density="comfy"
                    onload={handleLoad}
                    onsuccess={handleSuccess}
                    onerror={handleError}
                    onsubmit={handleSubmit}>

                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_ImporteDevolucion__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_MotivoDevolucion__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_NumeroCuentaBancaria__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input-field field-name="CAZ_ComprobanteReferencia__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input-field field-name="CAZ_Description__c" required></lightning-input-field>
                        </div>
                    </div>

                    <div class="slds-m-top_medium">
                        <lightning-button
                            variant="brand"
                            type="submit"
                            label="Crear solicitud"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            variant="neutral"
                            label="Cancelar"
                            onclick={handleCancel}>
                        </lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>

    </div>
</template>
