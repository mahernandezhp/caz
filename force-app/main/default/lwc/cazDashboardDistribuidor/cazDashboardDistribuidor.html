<template>
    <div class="slds-p-around_large dashboard-container">

        <!-- 1. WELCOME HEADER (Componente hijo) -->
        <c-caz-dashboard-header user-id={userId}></c-caz-dashboard-header>

        <!-- 2. KPI CARDS (Componente hijo) -->
        <c-caz-kpi-cards user-id={userId} onkpiaction={handleKpiAction}></c-caz-kpi-cards>

        <!-- 3. ACCIONES RÁPIDAS (Componente hijo) -->
        <c-caz-acciones-rapidas user-id={userId} onactionclick={handleQuickAction}></c-caz-acciones-rapidas>

        <!-- 4. LISTA Y SEGUIMIENTO (Vista Home) -->
        <template if:true={isHome}>
            <div class="slds-grid slds-gutters slds-wrap">
                <!-- 4a. Órdenes Recientes -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_2-of-3 slds-m-bottom_x-large">
                    <c-caz-ordenes-recientes user-id={userId} onviewall={handleViewAllOrders}></c-caz-ordenes-recientes>
                </div>

                <!-- 4b. Seguimiento en Vivo -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-bottom_x-large">
                    <c-caz-seguimiento-vivo user-id={userId}></c-caz-seguimiento-vivo>
                </div>
            </div>
        </template>

        <!-- SPA Routing: Devoluciones -->
        <template if:true={isDevoluciones}>
            <div class="slds-box slds-theme_default custom-card">
                <button onclick={handleNavHome} class="slds-button slds-m-bottom_medium spa-back-btn">
                    <lightning-icon icon-name="utility:back" size="x-small" class="slds-m-right_x-small"></lightning-icon> Volver al Inicio
                </button>
                <c-caz-mis-solicitudes new-request-page-name="SPA" onnavigatetopage={handleSpaNavigation}></c-caz-mis-solicitudes>
            </div>
        </template>

        <!-- SPA Routing: Nueva Devolución -->
        <template if:true={isNuevaDevolucion}>
            <div class="slds-box slds-theme_default custom-card">
                <button onclick={handleNavDevoluciones} class="slds-button slds-m-bottom_medium spa-back-btn">
                    <lightning-icon icon-name="utility:back" size="x-small" class="slds-m-right_x-small"></lightning-icon> Volver a Solicitudes Activas
                </button>
                <c-caz-solicitud-devolucion target-page-name="SPA" onnavigatetopage={handleSpaNavigation}></c-caz-solicitud-devolucion>
            </div>
        </template>
    </div>
</template>
